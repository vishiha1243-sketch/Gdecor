<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Túi Mua Sắm - DECORMODERN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#F9F6F0] text-stone-800 flex flex-col min-h-screen">

    <nav class="bg-[#F9F6F0]/90 backdrop-blur-md border-b border-stone-200/60">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between h-24 items-center">
                <div class="serif text-2xl tracking-widest text-stone-900 font-semibold">DECOR<span class="italic text-amber-700 font-normal">MODERN</span></div>
                <a href="index.html" class="text-xs tracking-widest uppercase text-stone-500 hover:text-amber-800">Quay lại trang chủ</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-4 sm:px-6 py-12 w-full">
        <div class="flex justify-center items-center space-x-6 mb-16 text-xs uppercase tracking-widest">
            <span class="text-amber-800 font-medium border-b border-amber-800 pb-1">1. Túi mua sắm</span>
            <span class="text-stone-300">/</span>
            <span class="text-stone-400">2. Điền thông tin</span>
            <span class="text-stone-300">/</span>
            <span class="text-stone-400">3. Hoàn tất</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2" id="cart-items-container">
                </div>

            <div class="bg-stone-100/60 p-8 rounded-sm border border-stone-200/40 h-fit">
                <h2 class="serif text-lg text-stone-900 mb-6 font-medium">Giá trị đơn hàng</h2>
                <div class="flex justify-between text-xl font-medium text-stone-900 border-b border-stone-200 pb-4 mb-6">
                    <span class="serif">Tổng cộng</span>
                    <span class="text-amber-900" id="cart-total-price">0đ</span>
                </div>
                <a href="thanh-toan.html" class="w-full block text-center bg-stone-900 py-4.5 text-white font-medium uppercase tracking-widest text-xs hover:bg-stone-800 transition rounded-sm shadow-xs">Tiến hành đặt hàng</a>
            </div>
        </div>
    </main>

    <footer class="bg-stone-900 text-stone-500 py-12 text-center text-xs">
        <p>© 2026 DECORMODERN Atelier.</p>
    </footer>

    <script>
        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('decor_cart')) || [];
            const container = document.getElementById('cart-items-container');
            const totalContainer = document.getElementById('cart-total-price');
            
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-stone-500 font-light py-12 text-center">Túi mua sắm của bạn đang rỗng.</p>`;
                totalContainer.innerText = "0đ";
                return;
            }
            
            let html = '<div class="border-t border-stone-200/80">';
            let total = 0;
            
            cart.forEach((item, index) => {
                let itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                html += `
                    <div class="flex py-8 border-b border-stone-200/80 items-center">
                        <div class="h-28 w-28 flex-shrink-0 overflow-hidden bg-stone-100 rounded-sm">
                            <img src="${item.image}" class="h-full w-full object-cover">
                        </div>
                        <div class="ml-6 flex flex-1 flex-col">
                            <div class="flex justify-between text-base font-medium text-stone-900">
                                <h3 class="serif text-lg">${item.name}</h3>
                                <p class="font-medium text-stone-900">${itemTotal.toLocaleString('vi-VN')}đ</p>
                            </div>
                            <div class="flex flex-1 items-end justify-between text-xs mt-4">
                                <div class="flex items-center border border-stone-300 rounded bg-white">
                                    <button onclick="updateQuantity(${index}, -1)" class="px-3 py-1 hover:bg-stone-100 cursor-pointer">-</button>
                                    <span class="px-4 py-1 border-x border-stone-200">${item.quantity}</span>
                                    <button onclick="updateQuantity(${index}, 1)" class="px-3 py-1 hover:bg-stone-100 cursor-pointer">+</button>
                                </div>
                                <button onclick="removeItem(${index})" class="text-stone-400 hover:text-amber-800 underline tracking-wide cursor-pointer">Bỏ sản phẩm</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
            totalContainer.innerText = total.toLocaleString('vi-VN') + "đ";
        }

        function updateQuantity(index, change) {
            let cart = JSON.parse(localStorage.getItem('decor_cart')) || [];
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('decor_cart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('decor_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('decor_cart', JSON.stringify(cart));
            renderCart();
        }

        window.onload = renderCart;
    </script>
</body>
</html>
