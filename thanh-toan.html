<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - DECORMODERN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#F9F6F0] text-stone-800 flex flex-col min-height-screen">

    <div class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 py-16 w-full">
        <div class="text-center serif text-3xl tracking-widest text-stone-900 font-semibold mb-12">
            DECOR<span class="italic text-amber-700 font-normal">MODERN</span>
        </div>
        
        <div class="flex justify-center items-center space-x-6 mb-16 text-xs uppercase tracking-widest">
            <span class="text-stone-400">1. Túi mua sắm</span>
            <span class="text-stone-300">/</span>
            <span class="text-amber-800 font-medium border-b border-amber-800 pb-1">2. Điền thông tin</span>
            <span class="text-stone-300">/</span>
            <span class="text-stone-400">3. Hoàn tất</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <div class="lg:col-span-7">
                <h2 class="serif text-xl font-medium mb-6 text-stone-900">Địa chỉ giao nhận</h2>
                <form class="space-y-5" onsubmit="return false;">
                    <div>
                        <label class="block text-xs font-medium uppercase tracking-wider text-stone-500">Họ và tên</label>
                        <input type="text" id="cust-name" placeholder="Nguyễn Văn A" class="mt-1 block w-full px-4 py-3.5 bg-stone-100 border border-stone-200 rounded-xs focus:outline-none focus:border-amber-800 text-sm font-light">
                    </div>
                    <div>
                        <label class="block text-xs font-medium uppercase tracking-wider text-stone-500">Số điện thoại</label>
                        <input type="tel" id="cust-phone" placeholder="0901234567" class="mt-1 block w-full px-4 py-3.5 bg-stone-100 border border-stone-200 rounded-xs focus:outline-none focus:border-amber-800 text-sm font-light">
                    </div>
                    <div>
                        <label class="block text-xs font-medium uppercase tracking-wider text-stone-500">Địa chỉ cụ thể</label>
                        <input type="text" id="cust-address" placeholder="Số nhà, tên đường..." class="mt-1 block w-full px-4 py-3.5 bg-stone-100 border border-stone-200 rounded-xs focus:outline-none focus:border-amber-800 text-sm font-light">
                    </div>
                </form>
            </div>

            <div class="lg:col-span-5 bg-stone-100/80 p-8 rounded-sm border border-stone-200/60 h-fit">
                <h2 class="serif text-lg font-medium mb-6 text-stone-900">Chi tiết đơn hàng</h2>
                <div id="checkout-items-list" class="space-y-4 mb-6">
                    </div>
                <div class="border-t border-stone-200 pt-6 flex justify-between text-xl font-medium text-stone-900">
                    <span class="serif">Tổng cộng</span>
                    <span class="text-amber-900" id="checkout-total">0đ</span>
                </div>
                <button onclick="confirmOrder()" class="w-full mt-8 bg-amber-800 py-4 text-white font-medium uppercase tracking-widest text-xs rounded-sm hover:bg-amber-900 transition shadow-xs cursor-pointer">Xác nhận đặt hàng</button>
            </div>
        </div>
    </div>

    <footer class="bg-stone-900 text-stone-500 py-12 text-center text-xs">
        <p>© 2026 DECORMODERN Atelier.</p>
    </footer>

    <script>
        function renderCheckout() {
            let cart = JSON.parse(localStorage.getItem('decor_cart')) || [];
            const listContainer = document.getElementById('checkout-items-list');
            const totalContainer = document.getElementById('checkout-total');
            
            if (cart.length === 0) {
                listContainer.innerHTML = '<p class="text-stone-500 text-sm font-light">Chưa có sản phẩm nào để thanh toán.</p>';
                return;
            }
            
            let html = '';
            let total = 0;
            
            cart.forEach(item => {
                total += item.price * item.quantity;
                html += `
                    <div class="flex justify-between items-center bg-white p-3 border border-stone-200/60 rounded-xs shadow-3xs">
                        <div class="flex items-center">
                            <img src="${item.image}" class="w-12 h-12 object-cover rounded-xs">
                            <span class="ml-3 text-xs font-medium text-stone-800 truncate max-w-[160px]">${item.name} × ${item.quantity}</span>
                        </div>
                        <span class="text-xs font-semibold text-stone-900">${(item.price * item.quantity).toLocaleString('vi-VN')}đ</span>
                    </div>
                `;
            });
            
            listContainer.innerHTML = html;
            totalContainer.innerText = total.toLocaleString('vi-VN') + "đ";
        }

        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-address').value;

            if(!name || !phone || !addr) {
                alert('Vui lòng điền đầy đủ thông tin giao hàng nhé bạn!');
                return;
            }

            alert(`Chúc mừng ${name}! Đơn đặt hàng nội thất của bạn đã được ghi nhận thành công. Xưởng sẽ sớm liên hệ qua số ${phone} để xác nhận kỹ thuật vẽ phối cảnh.`);
            localStorage.removeItem('decor_cart'); // Xóa giỏ hàng sau khi mua thành công
            window.location.href = "index.html";
        }

        window.onload = renderCheckout;
    </script>
</body>
</html>
